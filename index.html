<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossario iPad · iPadOS 26 — Flashcard</title>
<style>
  :root{
    --ink:#1d1d1f;
    --ink-soft:#86868b;
    --line:rgba(0,0,0,.08);
    --blue:#2d6cdf;
    --blue-deep:#1f53b8;
    --accent-grad:linear-gradient(180deg,#6db0ff,#2d6cdf);
    --novita:#0a7d4b;
    --pill:#ededf2;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font);color:var(--ink);height:100vh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(900px 520px at 8% -8%,rgba(255,182,214,.30),transparent 60%),
      radial-gradient(820px 480px at 98% -4%,rgba(168,200,255,.34),transparent 58%),
      radial-gradient(760px 520px at 50% 108%,rgba(201,182,250,.28),transparent 60%),
      radial-gradient(680px 460px at 0% 100%,rgba(176,232,219,.24),transparent 60%),
      #fbfcfe;
    background-attachment:fixed;
  }
  .app{display:flex;height:100vh}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:216px;flex:none;height:100vh;display:flex;flex-direction:column;
    padding:16px 14px;gap:4px;
    background:rgba(255,255,255,.55);
    backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);
    border-right:1px solid var(--line);
  }
  .s-brand{display:flex;align-items:center;gap:11px;padding:2px 6px 14px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .s-brand .mark{
    width:38px;height:38px;border-radius:11px;background:var(--accent-grad);
    display:grid;place-items:center;flex:none;box-shadow:0 6px 16px rgba(45,108,223,.32);
  }
  .s-brand h1{font-size:15px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
  .s-brand .ver{font-size:11px;font-weight:600;color:var(--blue-deep);margin-top:3px;display:inline-block}
  nav.nav{display:flex;flex-direction:column;gap:4px}
  .navitem{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    border:1px solid transparent;background:transparent;color:var(--ink-soft);
    padding:9px 11px;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .16s ease;
  }
  .navitem:hover{background:rgba(255,255,255,.8);color:var(--ink)}
  .navitem svg{width:18px;height:18px;flex:none}
  .navitem .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .navitem .n{font-size:10.5px;font-weight:700;color:#fff;background:#c4c6cf;border-radius:6px;padding:1px 6px;min-width:19px;text-align:center}
  .navitem.active{background:var(--accent-grad);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(45,108,223,.30)}
  .navitem.active .n{background:rgba(255,255,255,.28)}

  .side-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px}
  .count{font-size:12.5px;color:var(--ink-soft);font-weight:600;padding:0 4px}
  .count b{color:var(--blue-deep)}
  .side-btns{display:flex;gap:8px}
  .ibtn{
    flex:1;height:34px;border-radius:10px;border:1px solid var(--line);
    background:rgba(255,255,255,.8);color:var(--ink);cursor:pointer;
    display:grid;place-items:center;transition:all .16s ease;
  }
  .ibtn:hover{background:#fff;color:var(--blue);transform:translateY(-1px)}
  .ibtn svg{width:16px;height:16px}

  /* ---------- Content ---------- */
  .content{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column}
  .topic-desc{
    flex:none;display:flex;align-items:center;gap:9px;
    padding:15px 26px 0;font-size:13px;color:var(--ink-soft);font-weight:500;line-height:1.3;
  }
  .td-ico{flex:none;display:grid;place-items:center}
  .td-ico svg{width:17px;height:17px}
  main{flex:1;min-height:0;width:100%;padding:14px 26px 16px;display:flex}

  /* ---------- Grid 3x3 ---------- */
  .grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:16px;min-height:0}

  /* ---------- iPad-shaped flashcard ---------- */
  .card{perspective:1600px;cursor:pointer;height:100%;min-height:0;animation:rise .4s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .ipad{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .card.flipped .ipad{transform:rotateY(180deg)}
  .card:hover .ipad{transform:translateY(-4px)}
  .card.flipped:hover .ipad{transform:rotateY(180deg) translateY(-4px)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:32px;padding:11px;
    background:linear-gradient(145deg,#eceef2 0%,#d3d6dd 55%,#bcc0c9 100%);
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 0 0 1px rgba(0,0,0,.06),0 16px 36px rgba(30,40,80,.16);
  }
  .face.back{transform:rotateY(180deg)}
  .cam{position:absolute;top:5.5px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#5b5d66,#222);opacity:.55;z-index:3}
  .screen{
    position:relative;width:100%;height:100%;border-radius:22px;overflow:hidden;
    background:
      radial-gradient(120px 80px at 18% 16%,rgba(255,176,210,.40),transparent 70%),
      radial-gradient(150px 95px at 86% 18%,rgba(150,190,255,.46),transparent 70%),
      radial-gradient(150px 100px at 80% 92%,rgba(196,176,250,.40),transparent 72%),
      radial-gradient(140px 95px at 14% 88%,rgba(170,228,214,.34),transparent 72%),
      #fbfcfe;
    box-shadow:0 0 0 1px rgba(0,0,0,.05) inset;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:14px 22px;text-align:center;
  }
  .novita{position:absolute;top:13px;right:14px;font-size:9.5px;font-weight:800;letter-spacing:.04em;
    text-transform:uppercase;color:#fff;background:var(--novita);padding:4px 9px;border-radius:999px}
  .bigico{width:44px;height:44px;margin-bottom:12px}
  .bigico svg{width:44px;height:44px}
  .term{font-size:21px;font-weight:700;letter-spacing:-.02em;line-height:1.12}
  .en{font-size:12px;color:var(--ink-soft);font-weight:500;margin-top:6px}
  .pill{margin-top:16px;font-size:12.5px;font-weight:600;color:var(--blue);
    background:var(--pill);border-radius:999px;padding:8px 20px;border:1px solid rgba(0,0,0,.04)}
  .back .screen{justify-content:flex-start;padding:18px 22px}
  .back-term{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--blue-deep);
    align-self:stretch;padding-bottom:9px;margin-bottom:11px;border-bottom:1px solid rgba(0,0,0,.07)}
  .back-term svg{width:16px;height:16px;flex:none}
  .def{flex:1;min-height:0;display:flex;align-items:center;overflow:auto}
  .def-txt{width:100%;font-size:14px;line-height:1.5;color:#3a3b42;text-align:left}
  .def-txt strong{font-weight:700;color:var(--blue-deep)}
  .back .pill{margin-top:8px;color:var(--ink-soft);align-self:center}

  /* Schermi piccoli: sidebar in alto orizzontale + griglia scrollabile */
  @media(max-width:1000px),(max-height:680px){
    body{height:auto;overflow:auto}
    .app{flex-direction:column;height:auto}
    .sidebar{width:100%;height:auto;flex-direction:column;border-right:none;border-bottom:1px solid var(--line);padding:12px 16px}
    .s-brand{border-bottom:none;margin-bottom:8px;padding-bottom:0}
    nav.nav{flex-direction:row;overflow-x:auto;gap:6px;padding-bottom:4px}
    .navitem{flex:0 0 auto}
    .navitem .nm{overflow:visible}
    .side-foot{margin-top:10px;flex-direction:row;align-items:center;justify-content:space-between;border-top:none;padding-top:0}
    .side-btns{flex:0 0 auto}
    .ibtn{width:38px;flex:none}
    .content{height:auto}
    main{display:block;height:auto}
    .grid{grid-template-columns:repeat(2,1fr);grid-template-rows:none;gap:22px}
    .card{height:auto}
    .ipad{height:auto;aspect-ratio:1.4/1}
    .def{overflow:visible}
  }
  @media(max-width:660px){.grid{grid-template-columns:1fr}}
</style>
</head>

const tabsEl=document.getElementById('tabs');
const gridEl=document.getElementById('grid');
const descEl=document.getElementById('topicDesc');
const icoEl=document.getElementById('topicIco');
const flipCountEl=document.getElementById('flipCount');
let current=0;

GROUPS.forEach((g,i)=>{
  const b=document.createElement('button');
  b.className='navitem'+(i===0?' active':'');
  b.innerHTML=svg(g.icon,'currentColor','1.7')+'<span class="nm">'+g.name+'</span><span class="n">'+(i+1)+'</span>';
  b.addEventListener('click',()=>select(i));
  tabsEl.appendChild(b);
});

function updateFlipCount(){flipCountEl.textContent=gridEl.querySelectorAll('.card.flipped').length;}

function select(i){
  current=i;
  const g=GROUPS[i];
  document.querySelectorAll('.navitem').forEach((t,k)=>t.classList.toggle('active',k===i));
  descEl.textContent=g.desc;
  icoEl.innerHTML=svg(g.icon,'url(#blueGrad)','1.9');
  gridEl.innerHTML='';
  g.cards.forEach((c,k)=>{
    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=(k*0.04)+'s';
    card.innerHTML=`
      <div class="ipad">
        <div class="face front">
          <span class="cam"></span>
          <div class="screen">
            ${c.nuovo?'<span class="novita">Novità 26</span>':''}
            <div class="bigico">${svg(g.icon,'url(#blueGrad)','1.7')}</div>
            <div class="term">${c.t}</div>
            <div class="en">${c.en}</div>
            <div class="pill">Scopri</div>
          </div>
        </div>
        <div class="face back">
          <span class="cam"></span>
          <div class="screen">
            <div class="back-term">${svg(g.icon,'url(#blueGrad)','1.8')} ${c.t}</div>
            <div class="def"><div class="def-txt">${c.d}</div></div>
            <div class="pill">Tocca per girare</div>
          </div>
        </div>
      </div>`;
    card.addEventListener('click',()=>{card.classList.toggle('flipped');updateFlipCount();});
    gridEl.appendChild(card);
  });
  updateFlipCount();
}

document.getElementById('flipAll').addEventListener('click',()=>{
  const cards=gridEl.querySelectorAll('.card');
  const anyUnflipped=[...cards].some(c=>!c.classList.contains('flipped'));
  cards.forEach(c=>c.classList.toggle('flipped',anyUnflipped));
  updateFlipCount();
});
document.getElementById('reset').addEventListener('click',()=>{
  gridEl.querySelectorAll('.card').forEach(c=>c.classList.remove('flipped'));
  updateFlipCount();
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight'){select((current+1)%GROUPS.length);e.preventDefault();}
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){select((current-1+GROUPS.length)%GROUPS.length);e.preventDefault();}
});

select(0);
</script>
